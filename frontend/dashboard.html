<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bài tập của em</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.ba-cot{display:grid;gap:14px;align-items:start}
@media(min-width:960px){.ba-cot{grid-template-columns:230px 1fr 300px}}
.thanh-tile{display:flex;align-items:center;gap:8px;margin:2px 0 8px}
.thanh-tile small{width:110px;font-size:12.5px;color:var(--phu);flex:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.thanh-nen{flex:1;height:8px;background:var(--nen);border-radius:4px;overflow:hidden}
.thanh-day{height:8px;border-radius:4px;background:var(--xanh)}
.thanh-tile b{width:38px;text-align:right;font-size:12.5px;flex:none}
.muc-nho{font-size:12px;font-weight:700;color:var(--xanh);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 8px}
.muc-nho:first-child{margin-top:0}
.xh-dong{display:flex;justify-content:space-between;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px solid var(--vien)}
.xh-dong:last-child{border:none}
.xh-dong.toi{background:var(--xanh-nhat);border-radius:7px;padding:6px 8px}
.chip-yeu{display:inline-block;background:var(--vang-nhat);color:var(--vang);font-size:12px;font-weight:600;padding:4px 10px;border-radius:16px;margin:0 5px 5px 0}
</style>
</head>
<body>
<div class="khung-rong">
  <div class="dau-trang">
    <div class="logo" id="avatar"></div>
    <div style="flex:1"><h1 id="tenHS"></h1><p id="tenLop"></p></div>
    <button class="nut nut-nho" id="nutThoat">Thoát</button>
  </div>
  <div class="bao-loi" id="baoLoi"></div>

  <div class="ba-cot">
    <!-- CỘT TRÁI -->
    <div class="the" style="text-align:center">
      <div class="logo" id="avatar2" style="width:64px;height:64px;font-size:26px;border-radius:50%;margin:0 auto 10px"></div>
      <b id="tenHS2" style="font-size:15.5px"></b>
      <p id="tenLop2" style="font-size:13px;color:var(--phu);margin-top:2px"></p>
      <div style="border-top:1px solid var(--vien);margin-top:12px;padding-top:12px;text-align:left;font-size:13px;color:var(--phu)" id="tomTat">
        Đang tải...</div>
    </div>

    <!-- CỘT GIỮA: BÀI TẬP -->
    <div>
      <div class="dang-tai" id="dangTai">Đang tải bài tập...</div>
      <div id="khuCanLam" style="display:none">
        <div class="muc-nho">📝 Cần làm</div>
        <div id="dsCanLam"></div>
      </div>
      <div id="khuDaLam" style="display:none">
        <div class="muc-nho">✅ Đã hoàn thành</div>
        <div id="dsDaLam"></div>
      </div>
      <div class="the" id="trong" style="display:none;text-align:center;color:var(--phu)">
        Chưa có bài tập nào. Em quay lại sau nhé!</div>
    </div>

    <!-- CỘT PHẢI: PHÂN TÍCH + XẾP HẠNG -->
    <div>
      <div class="the">
        <b style="font-size:15px;display:block;margin-bottom:4px">📊 Kết quả của em</b>
        <div id="phanTich"><div class="dang-tai" style="padding:14px 0">Đang phân tích...</div></div>
      </div>
      <div class="the">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <b style="font-size:15px">🏆 Bảng xếp hạng lớp</b>
        </div>
        <div class="tab-thanh" style="margin-bottom:8px">
          <button class="tab-nut mo nut-nho" id="xhTab1" style="padding:5px 12px;font-size:12.5px">Điểm TB</button>
          <button class="tab-nut nut-nho" id="xhTab2" style="padding:5px 12px;font-size:12.5px">Tiến bộ nhất</button>
        </div>
        <div id="xepHang"><div class="dang-tai" style="padding:14px 0">Đang tải...</div></div>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
const phien = canPhien();
let xhData = null, xhMode = 'diem';
if (phien) {
  ['tenHS', 'tenHS2'].forEach(id => document.getElementById(id).textContent = phien.hoTen);
  ['tenLop', 'tenLop2'].forEach(id => document.getElementById(id).textContent = phien.tenLop);
  const cc = phien.hoTen.trim().split(' ').pop().slice(0, 1).toUpperCase();
  document.getElementById('avatar').textContent = cc;
  document.getElementById('avatar2').textContent = cc;
  taiTatCa();
}
document.getElementById('nutThoat').addEventListener('click', () => { xoaPhien(); location.href = 'index.html'; });

const TEN_LOAI = { luyen_tap: '<span class="nhan nhan-xanh">Luyện tập</span>',
  cham_va_luyen: '<span class="nhan nhan-vang">Chấm + luyện</span>', cham_diem: '' };
const TEN_KN = { nguphap: 'Ngữ pháp', tuvung: 'Từ vựng', dochieu: 'Đọc hiểu' };
const TEN_DC = { mcq: 'Trắc nghiệm', gapfill: 'Điền từ', shortanswer: 'Trả lời ngắn', transformation: 'Viết lại câu' };

async function taiTatCa() {
  // 3 nguồn song song: bài tập, phân tích, xếp hạng
  const [bt, pt, xh] = await Promise.all([
    callAPI({ action: 'getBaiTapList', lopID: phien.lopID, hocSinhID: phien.hocSinhID }),
    callAPI({ action: 'getPhanTichHS', hocSinhID: phien.hocSinhID }),
    callAPI({ action: 'getXepHang', lopID: phien.lopID })
  ]);
  renderBaiTap(bt);
  renderPhanTich(pt);
  xhData = xh; renderXepHang();
}

function theBai(bt) {
  const nutLai = bt.coTheLam && bt.trangThai !== 'chua_lam'
    ? `<a class="nut nut-nho" style="margin-left:6px" href="exam.html?id=${bt.baiTapID}"
        onclick="event.stopPropagation()">Luyện lại</a>` : '';
  const diem = bt.diemChinhThuc !== null && bt.diemChinhThuc !== undefined && bt.diemChinhThuc !== ''
    ? `<span class="nhan nhan-xanh">${bt.diemChinhThuc} điểm</span>`
    : (bt.diem !== null && bt.diem !== undefined && bt.diem !== '' ? `<span class="nhan nhan-xanh">${bt.diem} điểm</span>`
    : { chua_lam: '<span class="nhan nhan-vang">Chưa làm</span>', cho_duyet: '<span class="nhan nhan-vang">Chờ duyệt</span>',
        qua_han: '<span class="nhan nhan-do">Quá hạn</span>', da_nop: '<span class="nhan nhan-xanh">Đã nộp</span>' }[bt.trangThai] || '');
  const meta = [bt.hanNop ? 'Hạn: ' + fmtNgay(bt.hanNop) : null,
    bt.thoiGianLamBai ? bt.thoiGianLamBai + ' phút' : null,
    bt.loaiBai !== 'luyen_tap' && bt.soLanLam > 1 ? `Lượt chấm ${Math.min(bt.daLam - bt.daLuyen, bt.soLanLam)}/${bt.soLanLam}` : null,
    bt.daLuyen ? 'Đã luyện ' + bt.daLuyen + ' lần' : null].filter(Boolean).join(' · ');
  const link = bt.trangThai === 'chua_lam' && bt.coTheLam ? `exam.html?id=${bt.baiTapID}`
    : (bt.baiNopID ? `result.html?id=${bt.baiNopID}` : '#');
  return `<a class="hang-bai" href="${link}">
    <span><b>${esc(bt.tieuDe)} ${TEN_LOAI[bt.loaiBai] || ''}</b><small>${meta || 'Không giới hạn'}</small></span>
    <span style="display:flex;align-items:center">${diem}${nutLai}</span></a>`;
}

function renderBaiTap(r) {
  document.getElementById('dangTai').style.display = 'none';
  if (!r.ok) { baoLoi(r.error); return; }
  const canLam = r.dsBaiTap.filter(b => b.trangThai === 'chua_lam' && b.coTheLam);
  const daLam = r.dsBaiTap.filter(b => !(b.trangThai === 'chua_lam' && b.coTheLam));
  if (!r.dsBaiTap.length) { document.getElementById('trong').style.display = 'block'; return; }
  if (canLam.length) {
    document.getElementById('khuCanLam').style.display = 'block';
    document.getElementById('dsCanLam').innerHTML = canLam.map(theBai).join('');
  }
  if (daLam.length) {
    document.getElementById('khuDaLam').style.display = 'block';
    document.getElementById('dsDaLam').innerHTML = daLam.map(theBai).join('');
  }
  document.getElementById('tomTat').innerHTML =
    `Bài cần làm: <b>${canLam.length}</b><br>Bài đã nộp: <b>${daLam.filter(b => b.daLam > 0).length}</b>`;
}

function mauTiLe(t) { return t >= 75 ? 'var(--xanh)' : t >= 50 ? '#D99A1B' : 'var(--do)'; }
function thanhBar(x, ten) {
  return `<div class="thanh-tile"><small title="${esc(ten)}">${esc(ten)}</small>
    <div class="thanh-nen"><div class="thanh-day" style="width:${x.tiLe}%;background:${mauTiLe(x.tiLe)}"></div></div>
    <b>${x.tiLe}%</b></div>`;
}
function renderPhanTich(r) {
  const el = document.getElementById('phanTich');
  if (!r.ok || !r.duLieu) {
    el.innerHTML = '<p style="font-size:13px;color:var(--phu)">Làm bài đầu tiên để xem phân tích kết quả của em nhé!</p>';
    return;
  }
  let h = '';
  if (r.kyNang.length) h += '<div class="muc-nho">Theo kỹ năng</div>' +
    r.kyNang.map(x => thanhBar(x, TEN_KN[x.nhan] || x.nhan)).join('');
  if (r.chuDe.length) h += '<div class="muc-nho">Theo chủ đề</div>' +
    r.chuDe.slice(0, 5).map(x => thanhBar(x, x.nhan)).join('');
  if (r.dangCau.length) h += '<div class="muc-nho">Theo dạng bài</div>' +
    r.dangCau.map(x => thanhBar(x, TEN_DC[x.nhan] || x.nhan)).join('');
  if (r.canLuyen.length) h += '<div class="muc-nho">⚠️ Cần luyện thêm</div>' +
    r.canLuyen.map(x => `<span class="chip-yeu">${esc(TEN_KN[x.nhan] || TEN_DC[x.nhan] || x.nhan)} — ${x.tiLe}%</span>`).join('');
  el.innerHTML = h || '<p style="font-size:13px;color:var(--phu)">Chưa đủ dữ liệu — em làm thêm vài bài nhé!</p>';
}

document.getElementById('xhTab1').addEventListener('click', () => { xhMode = 'diem'; docTab(); });
document.getElementById('xhTab2').addEventListener('click', () => { xhMode = 'tienbo'; docTab(); });
function docTab() {
  document.getElementById('xhTab1').classList.toggle('mo', xhMode === 'diem');
  document.getElementById('xhTab2').classList.toggle('mo', xhMode === 'tienbo');
  renderXepHang();
}
function renderXepHang() {
  const el = document.getElementById('xepHang');
  if (!xhData || !xhData.ok) { el.innerHTML = '<p style="font-size:13px;color:var(--phu)">Chưa tải được xếp hạng.</p>'; return; }
  const ds = xhMode === 'diem' ? xhData.topDiem : xhData.topTienBo;
  if (!ds || !ds.length) {
    el.innerHTML = '<p style="font-size:13px;color:var(--phu)">' +
      (xhMode === 'diem' ? 'Chưa có bài chấm điểm nào trong lớp.' : 'Chưa có ai luyện lại bài — hãy là người đầu tiên!') + '</p>';
    return;
  }
  const huyChuong = ['🥇', '🥈', '🥉'];
  el.innerHTML = ds.slice(0, 7).map((x, i) => `
    <div class="xh-dong ${x.hocSinhID === phien.hocSinhID ? 'toi' : ''}">
      <span>${huyChuong[i] || (i + 1) + '.'} ${esc(x.hoTen)}${x.hocSinhID === phien.hocSinhID ? ' (em)' : ''}</span>
      <b>${xhMode === 'diem' ? x.diemTB : '+' + x.tienBo}</b></div>`).join('');
}
</script>
</body>
</html>

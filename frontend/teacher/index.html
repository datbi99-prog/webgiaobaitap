<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel giáo viên</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="khung-rong">
  <div class="dau-trang">
    <div class="logo">GV</div>
    <div style="flex:1"><h1>Panel giáo viên</h1><p>Giao bài · ngân hàng câu hỏi · chấm và duyệt</p></div>
    <button class="nut nut-nho" id="nutThoatGV" style="display:none">Khóa panel</button>
  </div>

  <div class="bao-loi" id="baoLoi"></div>
  <div class="bao-ok" id="baoOK"></div>

  <!-- ĐĂNG NHẬP -->
  <div class="the" id="manDangNhap" style="max-width:420px;margin:40px auto">
    <div class="nhom"><label>Khóa giáo viên (teacherKey)</label>
      <input type="text" id="oKey" placeholder="Dán khóa từ Apps Script" autocomplete="off"></div>
    <button class="nut nut-chinh nut-rong" id="nutMoKhoa">Mở panel</button>
  </div>

  <!-- PANEL -->
  <div id="panel" style="display:none">
    <div class="tab-thanh">
      <button class="tab-nut mo" data-tab="tabLop">Lớp & học sinh</button>
      <button class="tab-nut" data-tab="tabGiao">Giao bài</button>
      <button class="tab-nut" data-tab="tabNH">Ngân hàng câu hỏi</button>
      <button class="tab-nut" data-tab="tabNop">Bài nộp & duyệt</button>
    </div>

    <!-- ===== TAB LỚP ===== -->
    <div id="tabLop">
      <div class="the">
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
          <div style="flex:1;min-width:200px"><label>Tên lớp mới</label>
            <input type="text" id="tenLopMoi" placeholder="Ví dụ: CLB Tiếng Anh 9"></div>
          <button class="nut nut-chinh" id="nutTaoLop">Tạo lớp</button>
        </div>
      </div>
      <div id="dsLop" class="dang-tai">Đang tải danh sách lớp...</div>

      <div class="the" id="khungHS" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
          <b id="tenLopDangXem" style="font-size:15px"></b>
          <button class="nut nut-nho" onclick="document.getElementById('khungHS').style.display='none'">Đóng</button>
        </div>
        <div id="dsHS"></div>
        <div style="background:var(--nen);border-radius:11px;padding:14px;margin-top:12px">
          <label>Thêm học sinh — mỗi dòng một em (có thể kèm số thứ tự: <i>Nguyễn Văn A|5</i>)</label>
          <textarea id="oDanTen" rows="4" placeholder="Nguyễn Minh Anh&#10;Trần Bảo Châu|2"></textarea>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
            <small style="color:var(--mo)" id="demTen">0 học sinh sẽ được thêm</small>
            <button class="nut nut-chinh nut-nho" id="nutThemHS">Thêm vào lớp</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== TAB GIAO BÀI ===== -->
    <div id="tabGiao" style="display:none">
      <div class="the">
        <div class="luoi-2">
          <div class="nhom"><label>Tiêu đề bài tập</label>
            <input type="text" id="gbTieuDe" placeholder="Unit 5 — Word formation & Reading"></div>
          <div class="nhom"><label>Giao cho lớp</label><div id="gbLop" style="font-size:14px"></div></div>
          <div class="nhom"><label>Hạn nộp (để trống = không hạn)</label>
            <input type="datetime-local" id="gbHan"></div>
          <div class="nhom"><label>Thời gian làm bài (phút, 0 = không giới hạn)</label>
            <input type="number" id="gbPhut" value="0" min="0"></div>
          <div class="nhom"><label>Số lần được làm</label>
            <input type="number" id="gbLan" value="1" min="1"></div>
          <div class="nhom"><label>Hiện kết quả cho học sinh</label>
            <select id="gbHien"><option value="ngay">Ngay sau khi nộp</option>
              <option value="sau_han">Sau hạn nộp</option><option value="an">Khi thầy công bố</option></select></div>
          <div class="nhom"><label>Kỹ năng chung của bài (gắn nhãn tự động cho ngân hàng)</label>
            <select id="gbKyNang"><option value="">— Bài trộn / gắn nhãn sau —</option>
              <option value="nguphap">Ngữ pháp</option><option value="tuvung">Từ vựng</option>
              <option value="dochieu">Đọc hiểu</option></select></div>
          <div class="nhom" style="display:flex;gap:18px;align-items:center;padding-top:22px">
            <label style="display:flex;gap:7px;align-items:center;margin:0;cursor:pointer">
              <input type="checkbox" id="gbTron" style="width:16px;height:16px;accent-color:var(--xanh)"> Trộn thứ tự câu</label>
            <label style="display:flex;gap:7px;align-items:center;margin:0;cursor:pointer">
              <input type="checkbox" id="gbLuuNH" checked style="width:16px;height:16px;accent-color:var(--xanh)"> Lưu vào ngân hàng</label>
          </div>
        </div>
        <div class="nhom">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
            <label style="margin:0">Đề bài (JSON) — hoặc lắp từ tab Ngân hàng</label>
            <button class="nut nut-nho" id="nutMau">Chèn đề mẫu</button>
          </div>
          <textarea id="gbJSON" rows="10" style="font-family:ui-monospace,monospace;font-size:12.5px" placeholder='{"thangDiem":10,"sections":[...]}'></textarea>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="nut" id="nutXemTruoc">Xem trước như học sinh</button>
          <button class="nut nut-chinh" id="nutGiao">Giao bài</button>
        </div>
      </div>
      <div class="the" id="khungXemTruoc" style="display:none">
        <b style="display:block;margin-bottom:10px">Xem trước đề</b>
        <div id="noiDungXemTruoc"></div>
      </div>
    </div>

    <!-- ===== TAB NGÂN HÀNG ===== -->
    <div id="tabNH" style="display:none">
      <div class="the">
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
          <select id="nhKyNang" style="width:auto"><option value="">Kỹ năng: tất cả</option>
            <option value="nguphap">Ngữ pháp</option><option value="tuvung">Từ vựng</option>
            <option value="dochieu">Đọc hiểu</option><option value="chua_phan_loai">Chưa phân loại</option></select>
          <select id="nhDang" style="width:auto"><option value="">Dạng: tất cả</option>
            <option value="mcq">Trắc nghiệm</option><option value="gapfill">Điền từ</option>
            <option value="shortanswer">Trả lời ngắn</option><option value="transformation">Viết lại câu</option></select>
          <select id="nhNguon" style="width:auto"><option value="">Nguồn: tất cả</option></select>
          <input type="text" id="nhTuKhoa" placeholder="Tìm nội dung..." style="flex:1;min-width:140px">
          <button class="nut nut-nho" id="nutLoc">Lọc</button>
          <button class="nut nut-nho" id="nutThemCau">+ Thêm câu mới</button>
          <button class="nut nut-nho" id="nutXuatNH">Xuất kho (JSON)</button>
        </div>
        <div id="dsNH" class="dang-tai" style="display:none">Đang tải...</div>
        <div id="bangNH"></div>
        <div class="thanh-lap" id="thanhLap" style="display:none">
          <div><b id="demChon">0 câu đã chọn</b>
            <div style="font-size:12.5px;color:var(--phu)" id="coCauChon"></div></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <select id="nhanNhanh" style="width:auto;padding:7px 10px;font-size:13px">
              <option value="">Gắn nhãn kỹ năng...</option><option value="nguphap">→ Ngữ pháp</option>
              <option value="tuvung">→ Từ vựng</option><option value="dochieu">→ Đọc hiểu</option></select>
            <button class="nut nut-chinh nut-nho" id="nutLapDe">Tạo đề từ câu đã chọn</button>
          </div>
        </div>
      </div>

      <!-- Form thêm câu -->
      <div class="the" id="formCau" style="display:none">
        <b style="display:block;margin-bottom:12px">Thêm câu hỏi vào ngân hàng</b>
        <div class="luoi-2">
          <div class="nhom"><label>Dạng câu</label>
            <select id="fcDang"><option value="mcq">Trắc nghiệm</option><option value="gapfill">Điền từ / word formation</option>
              <option value="shortanswer">Trả lời ngắn</option><option value="transformation">Viết lại câu</option></select></div>
          <div class="nhom"><label>Kỹ năng</label>
            <select id="fcKyNang"><option value="nguphap">Ngữ pháp</option><option value="tuvung">Từ vựng</option>
              <option value="dochieu">Đọc hiểu</option></select></div>
          <div class="nhom"><label>Chủ đề (tùy chọn)</label><input type="text" id="fcChuDe" placeholder="Câu điều kiện, Unit 5..."></div>
          <div class="nhom"><label>Nguồn (tùy chọn)</label><input type="text" id="fcNguon" placeholder="Destination B2..."></div>
        </div>
        <div class="nhom"><label>Nội dung câu hỏi</label><input type="text" id="fcText"></div>
        <div id="fcMCQ">
          <label>Các lựa chọn — tick đáp án đúng (tối thiểu 2)</label>
          <div id="fcOpts"></div>
          <button class="nut nut-nho" id="nutThemOpt" style="margin:4px 0 12px">+ Thêm lựa chọn</button>
        </div>
        <div id="fcKhac" style="display:none">
          <div class="luoi-2">
            <div class="nhom"><label>Đáp án chấp nhận được — mỗi dòng một đáp án</label>
              <textarea id="fcDapAn" rows="3"></textarea></div>
            <div>
              <div class="nhom" id="oTuKhoa" style="display:none"><label>Keyword + từ bắt buộc (phẩy) + phần cho sẵn</label>
                <input type="text" id="fcKeyword" placeholder="Keyword, vd: TIME" style="margin-bottom:6px">
                <input type="text" id="fcRequired" placeholder="Từ bắt buộc: time, since" style="margin-bottom:6px">
                <input type="text" id="fcStem" placeholder="Phần cho sẵn: It's a long ___ him."></div>
              <div class="nhom"><label>Giới hạn số từ (0 = không)</label><input type="number" id="fcMaxWords" value="0" min="0"></div>
            </div>
          </div>
        </div>
        <div class="nhom"><label>Giải thích cho học sinh (tùy chọn, hiện ở trang kết quả)</label>
          <input type="text" id="fcGiaiThich"></div>
        <div style="display:flex;gap:8px">
          <button class="nut nut-chinh" id="nutLuuCau">Lưu vào ngân hàng</button>
          <button class="nut" onclick="document.getElementById('formCau').style.display='none'">Đóng</button>
        </div>
      </div>

      <!-- Cấu hình đề lắp từ ngân hàng -->
      <div class="the" id="formLapDe" style="display:none">
        <b style="display:block;margin-bottom:12px">Tạo đề từ <span id="soLap">0</span> câu đã chọn</b>
        <div class="luoi-2">
          <div class="nhom"><label>Tiêu đề bài</label><input type="text" id="ldTieuDe"></div>
          <div class="nhom"><label>Giao cho lớp</label><div id="ldLop" style="font-size:14px"></div></div>
          <div class="nhom"><label>Hạn nộp</label><input type="datetime-local" id="ldHan"></div>
          <div class="nhom"><label>Thời gian (phút)</label><input type="number" id="ldPhut" value="0" min="0"></div>
          <div class="nhom"><label>Hiện kết quả</label>
            <select id="ldHien"><option value="ngay">Ngay sau khi nộp</option>
              <option value="sau_han">Sau hạn nộp</option><option value="an">Khi thầy công bố</option></select></div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="nut nut-chinh" id="nutGiaoTuNH">Giao bài</button>
          <button class="nut" onclick="document.getElementById('formLapDe').style.display='none'">Hủy</button>
        </div>
      </div>
    </div>

    <!-- ===== TAB BÀI NỘP ===== -->
    <div id="tabNop" style="display:none">
      <div class="the">
        <div class="nhom"><label>Chọn bài tập</label><select id="npBaiTap"></select></div>
        <div id="bangNop"></div>
      </div>
      <div class="the" id="chiTietNop" style="display:none"></div>
    </div>
  </div>
</div>

<script src="../config.js"></script>
<script src="../app.js"></script>
<script>
// ===== Phiên giáo viên =====
let KEY = localStorage.getItem('teacherKey') || '';
const api = p => callAPI(Object.assign({ teacherKey: KEY }, p));

document.getElementById('nutMoKhoa').addEventListener('click', async () => {
  KEY = document.getElementById('oKey').value.trim();
  const r = await api({ action: 'getLopList' });
  if (!r.ok) { baoLoi('Khóa không đúng hoặc chưa kết nối được API.'); return; }
  localStorage.setItem('teacherKey', KEY);
  moPanel(r);
});
document.getElementById('nutThoatGV').addEventListener('click', () => {
  localStorage.removeItem('teacherKey'); location.reload();
});
(async () => { if (KEY) { const r = await api({ action: 'getLopList' }); if (r.ok) moPanel(r); } })();

let dsLop = [];
function moPanel(r) {
  document.getElementById('manDangNhap').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  document.getElementById('nutThoatGV').style.display = 'inline-flex';
  baoLoi('');
  renderLop(r.dsLop);
}

// ===== Tabs =====
document.querySelectorAll('.tab-nut').forEach(n => n.addEventListener('click', () => {
  document.querySelectorAll('.tab-nut').forEach(x => x.classList.remove('mo'));
  n.classList.add('mo');
  ['tabLop', 'tabGiao', 'tabNH', 'tabNop'].forEach(t =>
    document.getElementById(t).style.display = t === n.dataset.tab ? 'block' : 'none');
  if (n.dataset.tab === 'tabNH' && !document.getElementById('bangNH').innerHTML) locNH();
  if (n.dataset.tab === 'tabNop') taiBaiTapGV();
  if (n.dataset.tab === 'tabGiao') renderChonLop('gbLop');
}));

// ===== TAB LỚP & HỌC SINH =====
function renderLop(ds) {
  dsLop = ds;
  document.getElementById('dsLop').className = '';
  document.getElementById('dsLop').innerHTML = ds.length ? ds.map(l => `
    <div class="hang-bai" style="cursor:default">
      <span><b>${esc(l.tenLop)} ${l.trangThai !== 'active' ? '<span class="nhan nhan-xam">đã lưu trữ</span>' : ''}</b>
      <small>Mã lớp: <b>${esc(l.maLop)}</b> · ${l.soHS} học sinh</small></span>
      <span style="display:flex;gap:6px">
        <button class="nut nut-nho" onclick="xemHS('${l.lopID}','${esc(l.tenLop)}')">Học sinh</button>
        <button class="nut nut-nho" onclick="copyMa('${esc(l.maLop)}')">Chép mã</button>
      </span>
    </div>`).join('')
    : '<div class="the" style="text-align:center;color:var(--phu)">Chưa có lớp nào — tạo lớp đầu tiên ở trên nhé.</div>';
}
async function taiLaiLop() { const r = await api({ action: 'getLopList' }); if (r.ok) renderLop(r.dsLop); }
function copyMa(ma) { navigator.clipboard.writeText(ma); baoOK('Đã chép mã lớp: ' + ma); }

document.getElementById('nutTaoLop').addEventListener('click', async () => {
  const ten = document.getElementById('tenLopMoi').value.trim();
  if (!ten) { baoLoi('Nhập tên lớp trước đã.'); return; }
  const r = await api({ action: 'taoLop', tenLop: ten });
  if (!r.ok) { baoLoi(r.error); return; }
  document.getElementById('tenLopMoi').value = '';
  baoOK('Đã tạo lớp. Mã lớp cho học sinh: ' + r.maLop);
  taiLaiLop();
});

let lopDangXem = null;
async function xemHS(lopID, tenLop) {
  lopDangXem = lopID;
  document.getElementById('khungHS').style.display = 'block';
  document.getElementById('tenLopDangXem').textContent = tenLop;
  document.getElementById('dsHS').innerHTML = '<div class="dang-tai">Đang tải...</div>';
  const r = await api({ action: 'getHocSinhList', lopID });
  if (!r.ok) { baoLoi(r.error); return; }
  document.getElementById('dsHS').innerHTML = r.dsHocSinh.length
    ? '<table class="bang"><tr><th>STT</th><th>Họ tên</th><th></th></tr>' + r.dsHocSinh.map(h => `
      <tr style="${h.trangThai !== 'active' ? 'opacity:.5' : ''}">
        <td>${h.stt || ''}</td><td>${esc(h.hoTen)}</td>
        <td style="text-align:right"><button class="nut nut-nho"
          onclick="doiTrangThaiHS('${h.hocSinhID}','${h.trangThai === 'active' ? 'inactive' : 'active'}')">
          ${h.trangThai === 'active' ? 'Cho nghỉ' : 'Kích hoạt lại'}</button></td></tr>`).join('') + '</table>'
    : '<p style="color:var(--phu);font-size:14px">Lớp chưa có học sinh — dán danh sách bên dưới.</p>';
  document.getElementById('khungHS').scrollIntoView({ behavior: 'smooth' });
}
async function doiTrangThaiHS(id, tt) {
  await api({ action: 'suaHocSinh', hocSinhID: id, trangThai: tt });
  xemHS(lopDangXem, document.getElementById('tenLopDangXem').textContent);
}
document.getElementById('oDanTen').addEventListener('input', e => {
  const n = e.target.value.split('\n').filter(x => x.trim()).length;
  document.getElementById('demTen').textContent = n + ' học sinh sẽ được thêm';
});
document.getElementById('nutThemHS').addEventListener('click', async () => {
  const ds = document.getElementById('oDanTen').value.split('\n').map(x => x.trim()).filter(Boolean);
  if (!ds.length) return;
  const r = await api({ action: 'themHocSinh', lopID: lopDangXem, danhSach: ds });
  if (!r.ok) { baoLoi(r.error); return; }
  document.getElementById('oDanTen').value = '';
  document.getElementById('demTen').textContent = '0 học sinh sẽ được thêm';
  baoOK('Đã thêm ' + r.daThem + ' học sinh.');
  xemHS(lopDangXem, document.getElementById('tenLopDangXem').textContent);
  taiLaiLop();
});

// ===== TAB GIAO BÀI =====
function renderChonLop(elId) {
  document.getElementById(elId).innerHTML = dsLop.filter(l => l.trangThai === 'active').map(l =>
    `<label style="display:inline-flex;gap:6px;align-items:center;margin:0 14px 6px 0;cursor:pointer;font-weight:400">
     <input type="checkbox" value="${l.lopID}" style="width:15px;height:15px;accent-color:var(--xanh)">${esc(l.tenLop)}</label>`).join('')
    || '<span style="color:var(--phu)">Chưa có lớp — tạo ở tab Lớp & học sinh.</span>';
}
const layLopChon = elId => [...document.querySelectorAll('#' + elId + ' input:checked')].map(c => c.value);

const DE_MAU = {
  thangDiem: 10,
  sections: [
    { type: 'mcq', title: 'Part 1: Grammar', instructions: 'Choose the correct answer.', diemMoiCau: 1,
      questions: [{ id: 'q1', text: 'If I ___ you, I would accept the offer.', options: ['was', 'were'], answer: 1,
        giaiThich: "Câu điều kiện loại 2: 'were' dùng cho mọi ngôi." }] },
    { type: 'gapfill', title: 'Part 2: Word formation', instructions: 'Use the word in capitals to form a word that fits.', diemMoiCau: 1,
      questions: [{ id: 'q2', text: 'Her ___ to detail is impressive. (ATTEND)', answers: ['attention', 'attentiveness'] }] },
    { type: 'mcq', title: 'Part 3: Reading — True/False/Not Given',
      passage: 'Solar energy has grown rapidly over the past decade thanks to its low cost...',
      instructions: 'Read the passage and choose True, False or Not Given.', diemMoiCau: 1,
      questions: [{ id: 'q3', text: 'Solar panels were invented in the 21st century.', options: ['True', 'False', 'Not Given'], answer: 1 }] },
    { type: 'shortanswer', title: 'Part 4: Reading — Short answers', instructions: 'Answer in NO MORE THAN FOUR WORDS.', diemMoiCau: 1,
      questions: [{ id: 'q4', text: 'What is the main advantage of solar energy?', answers: ['low cost', 'its low cost'], maxWords: 4, flagIfNoMatch: true }] },
    { type: 'transformation', title: 'Part 5: Rewrite the sentences', instructions: 'Complete the second sentence so that it means the same.', diemMoiCau: 1,
      questions: [{ id: 'q5', text: "I haven't seen him for ages.", keyword: 'TIME', stem: "It's a long ___ him.",
        answers: ['time since I saw', 'time since I last saw'], requiredWords: ['time', 'since'], maxWords: 6 }] }
  ]
};
document.getElementById('nutMau').addEventListener('click', () => {
  document.getElementById('gbJSON').value = JSON.stringify(DE_MAU, null, 2);
});

function docJSONDe(elId) {
  try { return JSON.parse(document.getElementById(elId).value); }
  catch (e) { baoLoi('JSON đề bài không hợp lệ: ' + e.message); return null; }
}
document.getElementById('nutXemTruoc').addEventListener('click', () => {
  const de = docJSONDe('gbJSON'); if (!de) return;
  baoLoi('');
  document.getElementById('khungXemTruoc').style.display = 'block';
  let stt = 0;
  document.getElementById('noiDungXemTruoc').innerHTML = (de.sections || []).map(sec => {
    let h = `<div class="tieu-de-phan">${esc(sec.title || '')}</div>`;
    if (sec.instructions) h += `<div class="huong-dan">${esc(sec.instructions)}</div>`;
    if (sec.passage) h += `<div class="doan-van">${esc(sec.passage)}</div>`;
    h += (sec.questions || []).map(q => {
      stt++;
      let c = `<div class="cau"><div class="cau-de"><span class="stt">${stt}.</span> ${esc(q.text)}
        ${q.keyword ? '<span class="tu-khoa">' + esc(q.keyword) + '</span>' : ''}</div>`;
      if (sec.type === 'mcq') c += (q.options || []).map((op, i) =>
        `<div class="lua-chon" style="cursor:default${i === q.answer ? ';border-color:var(--xanh);background:var(--xanh-nhat)' : ''}">
         <span class="chucai">${chuCai(i)}.</span><span>${esc(op)}</span>
         ${i === q.answer ? '<span class="nhan nhan-xanh" style="margin-left:auto">đáp án</span>' : ''}</div>`).join('');
      else c += `<div style="font-size:13.5px;color:var(--xanh-dam)">Đáp án: <b>${esc((q.answers || []).join(' / '))}</b></div>`;
      return c + '</div>';
    }).join('');
    return h;
  }).join('');
  document.getElementById('khungXemTruoc').scrollIntoView({ behavior: 'smooth' });
});

document.getElementById('nutGiao').addEventListener('click', async () => {
  const de = docJSONDe('gbJSON'); if (!de) return;
  const lopIDs = layLopChon('gbLop');
  const tieuDe = document.getElementById('gbTieuDe').value.trim();
  if (!tieuDe) { baoLoi('Nhập tiêu đề bài tập.'); return; }
  if (!lopIDs.length) { baoLoi('Chọn ít nhất một lớp nhận bài.'); return; }
  baoLoi('');
  const nut = document.getElementById('nutGiao');
  nut.disabled = true; nut.textContent = 'Đang giao...';
  const r = await api({ action: 'taoBaiTap', tieuDe, lopIDs,
    hanNop: document.getElementById('gbHan').value || '',
    thoiGianLamBai: Number(document.getElementById('gbPhut').value) || 0,
    soLanLam: Number(document.getElementById('gbLan').value) || 1,
    hienKetQua: document.getElementById('gbHien').value,
    tronCau: document.getElementById('gbTron').checked,
    kyNangChung: document.getElementById('gbKyNang').value,
    luuNganHang: document.getElementById('gbLuuNH').checked,
    deBai: de });
  nut.disabled = false; nut.textContent = 'Giao bài';
  if (!r.ok) { baoLoi(r.error); return; }
  baoOK(`Đã giao bài ${r.baiTapID}. Ngân hàng: thêm ${r.nganHang.daThem} câu mới, liên kết ${r.nganHang.daLienKet} câu sẵn có.`);
  document.getElementById('gbJSON').value = '';
  document.getElementById('khungXemTruoc').style.display = 'none';
});

// ===== TAB NGÂN HÀNG =====
const TEN_KN = { nguphap: 'Ngữ pháp', tuvung: 'Từ vựng', dochieu: 'Đọc hiểu', chua_phan_loai: 'Chưa phân loại' };
const TEN_DC = { mcq: 'Trắc nghiệm', gapfill: 'Điền từ', shortanswer: 'Trả lời ngắn', transformation: 'Viết lại câu' };
let chonNH = {}; // cauHoiID -> true (giữ qua các lần lọc)

document.getElementById('nutLoc').addEventListener('click', locNH);
async function locNH() {
  const dsEl = document.getElementById('dsNH');
  dsEl.style.display = 'block'; dsEl.className = 'dang-tai'; dsEl.textContent = 'Đang tải ngân hàng...';
  const r = await api({ action: 'timCauHoi',
    kyNang: document.getElementById('nhKyNang').value,
    dangCau: document.getElementById('nhDang').value,
    nguon: document.getElementById('nhNguon').value,
    tuKhoa: document.getElementById('nhTuKhoa').value.trim(), pageSize: 60 });
  dsEl.style.display = 'none';
  if (!r.ok) { baoLoi(r.error); return; }
  const nguonSel = document.getElementById('nhNguon');
  const giu = nguonSel.value;
  nguonSel.innerHTML = '<option value="">Nguồn: tất cả</option>' +
    (r.dsNguon || []).map(n => `<option ${n === giu ? 'selected' : ''}>${esc(n)}</option>`).join('');
  document.getElementById('bangNH').innerHTML = r.dsCau.length
    ? `<p style="font-size:12.5px;color:var(--phu);margin-bottom:8px">Hiện ${r.dsCau.length}/${r.tong} câu khớp bộ lọc</p>` +
      r.dsCau.map(c => `
      <label class="hang-bai" style="cursor:pointer">
        <span style="display:flex;gap:10px;align-items:flex-start;flex:1">
          <input type="checkbox" data-nh="${c.cauHoiID}" ${chonNH[c.cauHoiID] ? 'checked' : ''}
            style="width:16px;height:16px;margin-top:3px;accent-color:var(--xanh)">
          <span><b style="font-weight:500">${esc((c.noiDung.text || '').slice(0, 110))}</b>
          <small>${TEN_DC[c.dangCau] || c.dangCau} · ${esc(c.nguon || 'không nguồn')}
          ${c.thongKe.soLuotLam ? ' · đúng ' + c.thongKe.tiLeDung + '% (' + c.thongKe.soLuotLam + ' lượt)' : ''}
          ${c.thongKe.soLuotLam >= 5 && c.thongKe.tiLeDung <= 15 ? ' <span class="nhan nhan-do">kiểm tra đáp án?</span>' : ''}</small></span>
        </span>
        <span class="nhan ${c.kyNang === 'chua_phan_loai' ? 'nhan-vang' : 'nhan-xanh'}">${TEN_KN[c.kyNang] || c.kyNang}</span>
      </label>`).join('')
    : '<p style="color:var(--phu);padding:16px 0;text-align:center">Chưa có câu nào khớp — thêm câu mới hoặc giao một bài bất kỳ, câu sẽ tự chảy vào đây.</p>';
  document.querySelectorAll('[data-nh]').forEach(c => c.addEventListener('change', () => {
    chonNH[c.dataset.nh] = c.checked; if (!c.checked) delete chonNH[c.dataset.nh]; demNH();
  }));
  demNH();
}
function demNH() {
  const n = Object.keys(chonNH).length;
  document.getElementById('thanhLap').style.display = n ? 'flex' : 'none';
  document.getElementById('demChon').textContent = n + ' câu đã chọn';
}
document.getElementById('nhanNhanh').addEventListener('change', async e => {
  if (!e.target.value) return;
  const r = await api({ action: 'ganNhanCauHoi', cauHoiIDs: Object.keys(chonNH), kyNang: e.target.value });
  e.target.value = '';
  if (r.ok) { baoOK('Đã gắn nhãn ' + r.daSua + ' câu.'); locNH(); }
});
document.getElementById('nutXuatNH').addEventListener('click', async () => {
  const r = await api({ action: 'xuatNganHang' });
  if (r.ok) baoOK('Đã xuất ' + r.soCau + ' câu ra Drive (folder Backup_WebApp_GiaoBai).');
});

// Form thêm câu
let fcOpts = [{ t: '', c: true }, { t: '', c: false }];
document.getElementById('nutThemCau').addEventListener('click', () => {
  document.getElementById('formCau').style.display = 'block';
  const nho = JSON.parse(localStorage.getItem('nhoNhan') || '{}');
  if (nho.kyNang) document.getElementById('fcKyNang').value = nho.kyNang;
  if (nho.chuDe) document.getElementById('fcChuDe').value = nho.chuDe;
  if (nho.nguon) document.getElementById('fcNguon').value = nho.nguon;
  renderOpts();
  document.getElementById('formCau').scrollIntoView({ behavior: 'smooth' });
});
document.getElementById('fcDang').addEventListener('change', e => {
  const mcq = e.target.value === 'mcq';
  document.getElementById('fcMCQ').style.display = mcq ? 'block' : 'none';
  document.getElementById('fcKhac').style.display = mcq ? 'none' : 'block';
  document.getElementById('oTuKhoa').style.display = e.target.value === 'transformation' ? 'block' : 'none';
});
function renderOpts() {
  document.getElementById('fcOpts').innerHTML = fcOpts.map((o, i) => `
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
      <input type="radio" name="fcDung" ${o.c ? 'checked' : ''} data-i="${i}" style="width:16px;height:16px;accent-color:var(--xanh)">
      <b style="width:20px;color:var(--phu)">${chuCai(i)}.</b>
      <input type="text" value="${esc(o.t)}" data-t="${i}" style="flex:1">
      <button class="nut nut-nho" data-x="${i}" ${fcOpts.length <= 2 ? 'disabled' : ''}>✕</button>
    </div>`).join('');
  document.querySelectorAll('[data-t]').forEach(el => el.addEventListener('input', e => fcOpts[e.target.dataset.t].t = e.target.value));
  document.querySelectorAll('[name=fcDung]').forEach(el => el.addEventListener('change', e => {
    fcOpts.forEach(o => o.c = false); fcOpts[e.target.dataset.i].c = true;
  }));
  document.querySelectorAll('[data-x]').forEach(el => el.addEventListener('click', e => {
    if (fcOpts.length > 2) { fcOpts.splice(e.target.dataset.x, 1); if (!fcOpts.some(o => o.c)) fcOpts[0].c = true; renderOpts(); }
  }));
}
document.getElementById('nutThemOpt').addEventListener('click', () => { fcOpts.push({ t: '', c: false }); renderOpts(); });

document.getElementById('nutLuuCau').addEventListener('click', async () => {
  const dang = document.getElementById('fcDang').value;
  const text = document.getElementById('fcText').value.trim();
  if (!text) { baoLoi('Nhập nội dung câu hỏi.'); return; }
  const noiDung = { text };
  const gt = document.getElementById('fcGiaiThich').value.trim();
  if (gt) noiDung.giaiThich = gt;
  if (dang === 'mcq') {
    const ops = fcOpts.map(o => o.t.trim());
    if (ops.filter(Boolean).length < 2) { baoLoi('Cần tối thiểu 2 lựa chọn có nội dung.'); return; }
    noiDung.options = ops; noiDung.answer = fcOpts.findIndex(o => o.c);
  } else {
    const dapAn = document.getElementById('fcDapAn').value.split('\n').map(x => x.trim()).filter(Boolean);
    if (!dapAn.length) { baoLoi('Nhập ít nhất một đáp án chấp nhận được.'); return; }
    noiDung.answers = dapAn;
    const mw = Number(document.getElementById('fcMaxWords').value);
    if (mw > 0) noiDung.maxWords = mw;
    if (dang === 'shortanswer') noiDung.flagIfNoMatch = true;
    if (dang === 'transformation') {
      const kw = document.getElementById('fcKeyword').value.trim();
      if (kw) noiDung.keyword = kw;
      const st = document.getElementById('fcStem').value.trim();
      if (st) noiDung.stem = st;
      noiDung.requiredWords = document.getElementById('fcRequired').value.split(',').map(x => x.trim()).filter(Boolean);
    }
  }
  const meta = { kyNang: document.getElementById('fcKyNang').value,
    chuDe: document.getElementById('fcChuDe').value.trim(), nguon: document.getElementById('fcNguon').value.trim() };
  localStorage.setItem('nhoNhan', JSON.stringify(meta)); // ghi nhớ nhãn vừa dùng
  const r = await api({ action: 'themCauHoi', dsCau: [Object.assign({ dangCau: dang, noiDung }, meta)] });
  if (!r.ok) { baoLoi(r.error); return; }
  if (r.trung.length) baoOK('Câu này đã có trong kho (' + r.trung[0].cauHoiID + ') — không thêm bản trùng.');
  else baoOK('Đã lưu câu vào ngân hàng.');
  document.getElementById('fcText').value = ''; document.getElementById('fcGiaiThich').value = '';
  document.getElementById('fcDapAn').value = ''; fcOpts = [{ t: '', c: true }, { t: '', c: false }]; renderOpts();
  locNH();
});

// Lắp đề từ ngân hàng
document.getElementById('nutLapDe').addEventListener('click', () => {
  document.getElementById('formLapDe').style.display = 'block';
  document.getElementById('soLap').textContent = Object.keys(chonNH).length;
  renderChonLop('ldLop');
  document.getElementById('formLapDe').scrollIntoView({ behavior: 'smooth' });
});
document.getElementById('nutGiaoTuNH').addEventListener('click', async () => {
  const tieuDe = document.getElementById('ldTieuDe').value.trim();
  const lopIDs = layLopChon('ldLop');
  if (!tieuDe) { baoLoi('Nhập tiêu đề bài.'); return; }
  if (!lopIDs.length) { baoLoi('Chọn lớp nhận bài.'); return; }
  const nut = document.getElementById('nutGiaoTuNH');
  nut.disabled = true; nut.textContent = 'Đang giao...';
  const r = await api({ action: 'taoBaiTapTuNganHang', cauHoiIDs: Object.keys(chonNH),
    tieuDe, lopIDs, hanNop: document.getElementById('ldHan').value || '',
    thoiGianLamBai: Number(document.getElementById('ldPhut').value) || 0,
    hienKetQua: document.getElementById('ldHien').value });
  nut.disabled = false; nut.textContent = 'Giao bài';
  if (!r.ok) { baoLoi(r.error); return; }
  chonNH = {}; demNH();
  document.getElementById('formLapDe').style.display = 'none';
  baoOK('Đã giao bài ' + r.baiTapID + ' lắp từ ngân hàng.');
});

// ===== TAB BÀI NỘP & DUYỆT =====
async function taiBaiTapGV() {
  const r = await api({ action: 'getBaiTapListGV' });
  if (!r.ok) { baoLoi(r.error); return; }
  const sel = document.getElementById('npBaiTap');
  sel.innerHTML = '<option value="">— Chọn bài tập —</option>' + r.dsBaiTap.map(b =>
    `<option value="${b.baiTapID}">${esc(b.tieuDe)} (${b.soNop} nộp${b.soCho ? ', ' + b.soCho + ' chờ duyệt' : ''})</option>`).join('');
  sel.onchange = () => sel.value && taiBaiNop(sel.value);
}
async function taiBaiNop(baiTapID) {
  document.getElementById('bangNop').innerHTML = '<div class="dang-tai">Đang tải...</div>';
  const r = await api({ action: 'getBaiNopList', baiTapID });
  if (!r.ok) { baoLoi(r.error); return; }
  const NHAN = { hoan_tat: 'nhan-xanh', cho_gv_duyet: 'nhan-vang', nop_muon: 'nhan-do' };
  const TEN = { hoan_tat: 'Hoàn tất', cho_gv_duyet: 'Chờ duyệt', nop_muon: 'Nộp muộn' };
  document.getElementById('bangNop').innerHTML = r.dsBaiNop.length
    ? '<table class="bang"><tr><th>Học sinh</th><th>Nộp lúc</th><th>Điểm</th><th>Trạng thái</th><th></th></tr>' +
      r.dsBaiNop.map(b => `<tr>
        <td><b>${esc(b.hoTen)}</b>${b.ghiChuGV ? '<br><small style="color:var(--do)">' + esc(b.ghiChuGV) + '</small>' : ''}</td>
        <td>${fmtNgay(b.thoiGianNop)}</td><td><b>${b.diem}</b></td>
        <td><span class="nhan ${NHAN[b.trangThai] || 'nhan-xam'}">${TEN[b.trangThai] || b.trangThai}${b.soCho ? ' (' + b.soCho + ')' : ''}</span></td>
        <td><button class="nut nut-nho" onclick="xemChiTiet('${b.baiNopID}')">Xem</button></td></tr>`).join('') + '</table>'
    : '<p style="color:var(--phu);text-align:center;padding:14px 0">Chưa có bài nộp nào.</p>';
}
async function xemChiTiet(baiNopID) {
  const khung = document.getElementById('chiTietNop');
  khung.style.display = 'block';
  khung.innerHTML = '<div class="dang-tai">Đang tải chi tiết...</div>';
  const r = await api({ action: 'getBaiNopChiTiet', baiNopID });
  if (!r.ok) { baoLoi(r.error); return; }
  const NHAN = { dung: ['dung', 'Đúng', 'nhan-xanh'], sai: ['sai', 'Sai', 'nhan-do'], cho_duyet: ['cho', 'Chờ duyệt', 'nhan-vang'] };
  khung.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <b>${esc(r.tieuDe)} — điểm hiện tại: ${r.diem}</b>
    <button class="nut nut-nho" onclick="document.getElementById('chiTietNop').style.display='none'">Đóng</button></div>` +
    r.chiTiet.map(c => {
      const [lop, ten, mau] = NHAN[c.trangThai] || NHAN.sai;
      return `<div class="kq-cau ${lop}">
        <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:4px">
          <span style="font-size:13.5px">${esc(c.text)}</span>
          <span class="nhan ${mau}">${ten}</span></div>
        <div style="font-size:13.5px">HS trả lời: <b>${esc(String(c.traLoi))}</b>
          <span style="color:var(--phu)"> · Đáp án: ${esc(c.dapAn)}</span></div>
        ${c.trangThai === 'cho_duyet' ? `<div style="display:flex;gap:8px;margin-top:8px">
          <button class="nut nut-chinh nut-nho" onclick="duyet('${baiNopID}','${c.id}',true)">Chấp nhận (+${c.diemToiDa - c.diem} điểm)</button>
          <button class="nut nut-nho" onclick="duyet('${baiNopID}','${c.id}',false)">Không chấp nhận</button></div>` : ''}
      </div>`;
    }).join('');
  khung.scrollIntoView({ behavior: 'smooth' });
}
async function duyet(baiNopID, questionID, chapNhan) {
  const r = await api({ action: 'duyetCau', baiNopID, questionID, chapNhan });
  if (!r.ok) { baoLoi(r.error); return; }
  baoOK('Đã duyệt. Điểm mới: ' + r.diemMoi + (r.soChoConLai ? ' — còn ' + r.soChoConLai + ' câu chờ.' : ' — bài đã hoàn tất.'));
  xemChiTiet(baiNopID);
  taiBaiNop(document.getElementById('npBaiTap').value);
}
</script>
